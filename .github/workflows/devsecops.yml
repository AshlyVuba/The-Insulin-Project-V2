name: First Response Express DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: BACKEND SECURITY SCAN (Already working!)
  # ==========================================
  security-scan:
    name: OWASP & Code Health Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Security Tools (Bandit)
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Execute SAST Scan
      run: |
        bandit -r backend/ -ll -ii

  # ==========================================
  # JOB 2: FRONTEND BUILD & DEPLOY (The Fix!)
  # ==========================================
  frontend-build:
    name: Build React Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Ensure this matches the Node version you use locally

    - name: Install Dependencies
      run: npm ci # 'ci' is faster and more reliable for automated builds than 'install'

    - name: Build the React Application
      run: npm run build
      env:
        # Pass your environment variables so the build process can see them!
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

    # (Optional) If you are using GitHub Pages, this step uploads the build folder
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: frontend-build
        path: build/