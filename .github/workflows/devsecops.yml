name: First Response Express DevSecOps Pipeline

# 1. THE TRIGGER: Run this automatically on every push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: STATIC APPLICATION SECURITY TESTING
  # ==========================================
  security-scan:
    name: OWASP & Code Health Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Security Tools (Bandit)
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Execute SAST Scan (OWASP A06 Mitigation)
      # Bandit will scan the entire backend folder. 
      # -ll ignores low-severity issues to keep the hackathon moving.
      # -ii ignores low-confidence issues.
      run: |
        echo "Running Bandit Security Scanner..."
        bandit -r backend/ -ll -ii

  # ==========================================
  # JOB 2: CLOUD DEPLOYMENT
  # ==========================================
  deploy-to-cloud:
    name: Deploy to Production
    needs: security-scan # 🛑 THE BOUNCER: This job ONLY runs if the security scan passes!
    runs-on: ubuntu-latest

    steps:
    - name: Trigger Cloud Server (Render / Azure / AWS)
      # In a real enterprise environment, this step pings the cloud provider 
      # to pull the clean, verified code and restart the live server.
      run: |
        echo "Security scan passed successfully! No OWASP vulnerabilities detected."
        echo "Initiating zero-downtime deployment to the live public clinic portal..."
        # Example real-world trigger: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}